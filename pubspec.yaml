name: appmobile
description: App Mobile para vistoria operacional com captura, revisão, voz e suporte assistivo.
publish_to: 'none'
version: 1.2.9+11

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.5
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  geolocator: ^14.0.2
  image_picker: ^1.0.7
  exif: ^3.3.0
  shared_preferences: ^2.5.3
  package_info_plus: ^9.0.0
  camera: ^0.11.3+1
  path_provider: ^2.1.5
  speech_to_text: ^7.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/config/menu_update_package_v1.json
