spring:
  application:
    name: backoffice-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/backoffice}
    username: ${SPRING_DATASOURCE_USERNAME:backoffice}
    password: ${SPRING_DATASOURCE_PASSWORD:backoffice}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
      password: ${SPRING_DATA_REDIS_PASSWORD:}

storage:
  adapter: ${STORAGE_ADAPTER:local}
  local:
    path: ${STORAGE_LOCAL_PATH:./uploads}
  r2:
    endpoint: ${R2_ENDPOINT:}
    access-key: ${R2_ACCESS_KEY:}
    secret-key: ${R2_SECRET_KEY:}
    bucket: ${R2_BUCKET:backoffice-uploads}
    public-base: ${R2_PUBLIC_BASE:}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

server:
  port: 8080

springdoc:
  api-docs:
    path: /api/openapi/v1

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
    access-token-minutes: 15
    refresh-token-days: 7
  lockout:
    max-attempts: 5
    window-minutes: 10

integration:
  config-signing:
    hmac-key: ${INTEGRATION_CONFIG_SIGNING_HMAC_KEY:}
    require-secret: ${INTEGRATION_CONFIG_SIGNING_REQUIRE_SECRET:false}
  ai-gateway:
    enabled: ${AI_GATEWAY_ENABLED:false}
    base-url: ${AI_GATEWAY_BASE_URL:}
    api-key: ${AI_GATEWAY_API_KEY:}
    model: ${AI_GATEWAY_MODEL:gemini-2.5-flash}
    research-path: ${AI_GATEWAY_RESEARCH_PATH:/v1/research/cases}
    require-secret: ${AI_GATEWAY_REQUIRE_SECRET:true}

operations:
  control-tower:
    retention-days: ${OPERATIONS_CONTROL_TOWER_RETENTION_DAYS:30}
    retention-cron: ${OPERATIONS_CONTROL_TOWER_RETENTION_CRON:0 15 3 * * *}
