spring:
  application:
    name: backoffice-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/backoffice}
    username: ${SPRING_DATASOURCE_USERNAME:backoffice}
    password: ${SPRING_DATASOURCE_PASSWORD:backoffice}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
      password: ${SPRING_DATA_REDIS_PASSWORD:}

storage:
  adapter: ${STORAGE_ADAPTER:local}
  local:
    path: ${STORAGE_LOCAL_PATH:./uploads}
  r2:
    endpoint: ${R2_ENDPOINT:}
    access-key: ${R2_ACCESS_KEY:}
    secret-key: ${R2_SECRET_KEY:}
    bucket: ${R2_BUCKET:backoffice-uploads}
    public-base: ${R2_PUBLIC_BASE:}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

server:
  port: 8080
