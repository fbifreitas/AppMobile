name: Web CI

on:
  push:
    branches: ["main"]
    paths:
      - "apps/web-backoffice/**"
      - ".github/workflows/web_ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "apps/web-backoffice/**"
      - ".github/workflows/web_ci.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/web-backoffice

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web-backoffice/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v6
        with:
          name: web-backoffice-next-build
          path: |
            apps/web-backoffice/.next
            apps/web-backoffice/public
            apps/web-backoffice/package.json
            apps/web-backoffice/next.config.mjs
          if-no-files-found: error
