name: Project Board Visual Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'
  push:
    branches: ["main"]
    paths:
      - "infra/scripts/sync_project_visuals.ps1"
      - "docs/GITHUB_PROJECTS_GESTAO_BACKLOG.md"

permissions:
  contents: read
  repository-projects: write

jobs:
  sync-project-visuals:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check automation token
        id: check_token
        shell: pwsh
        env:
          PROJECT_AUTOMATION_TOKEN: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PROJECT_AUTOMATION_TOKEN)) {
            "ready=false" >> $env:GITHUB_OUTPUT
          } else {
            "ready=true" >> $env:GITHUB_OUTPUT
          }

      - name: Skip sync without project token
        if: steps.check_token.outputs.ready != 'true'
        shell: pwsh
        run: Write-Output 'Sincronizacao visual ignorada: configure o secret PROJECT_AUTOMATION_TOKEN com escopo de acesso ao GitHub Project.'

      - name: Sync project visuals
        if: steps.check_token.outputs.ready == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
          PROJECT_OWNER: fbifreitas
          PROJECT_NUMBER: '1'
          PROJECT_ID: PVT_kwHOECRsGc4BTNJY
        run: ./infra/scripts/sync_project_visuals.ps1