name: Project Board Visual Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'
  push:
    branches: ["main"]
    paths:
      - "infra/scripts/sync_project_visuals.ps1"
      - "docs/GITHUB_PROJECTS_GESTAO_BACKLOG.md"

jobs:
  sync-project-visuals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Sync project visuals
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
          PROJECT_OWNER: "@me"
          PROJECT_NUMBER: '1'
          PROJECT_ID: PVT_kwHOECRsGc4BTNJY
        run: ./infra/scripts/sync_project_visuals.ps1