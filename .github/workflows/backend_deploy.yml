name: Backend Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "apps/backend/**"
      - ".github/workflows/backend_deploy.yml"
  workflow_dispatch:
    inputs:
      target:
        description: "Ambiente de deploy"
        required: false
        default: "staging"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: apps/backend/pom.xml

      - name: Build
        run: mvn package -DskipTests -q

      - name: Test
        run: mvn test -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v6
        with:
          name: backoffice-api-jar
          path: apps/backend/target/*.jar
          if-no-files-found: error

  deploy-staging:
    if: github.event_name == 'push' || github.event.inputs.target == 'staging'
    runs-on: ubuntu-latest
    needs: build
    environment: staging

    steps:
      - name: Check VPS secrets
        id: check_vps_staging
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [[ -n "$VPS_HOST" && -n "$VPS_USER" && -n "$VPS_SSH_KEY" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy backend to VPS (staging)
        if: steps.check_vps_staging.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/backoffice
            git pull origin main
            docker compose -f infra/docker-compose.yml up -d --build api
            docker compose -f infra/docker-compose.yml exec -T api wget -qO- http://localhost:8080/actuator/health || true

      - name: Skip deploy without VPS secrets
        if: steps.check_vps_staging.outputs.ready != 'true'
        run: echo "Deploy de staging ignorado: configure VPS_HOST, VPS_USER e VPS_SSH_KEY nos secrets do GitHub."

  deploy-production:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production'
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Check VPS secrets
        id: check_vps_production
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [[ -n "$VPS_HOST" && -n "$VPS_USER" && -n "$VPS_SSH_KEY" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy backend to VPS (production)
        if: steps.check_vps_production.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/backoffice
            git pull origin main
            docker compose -f infra/docker-compose.yml up -d --build api
            docker compose -f infra/docker-compose.yml exec -T api wget -qO- http://localhost:8080/actuator/health || true

      - name: Skip deploy without VPS secrets
        if: steps.check_vps_production.outputs.ready != 'true'
        run: echo "Deploy de production ignorado: configure VPS_HOST, VPS_USER e VPS_SSH_KEY nos secrets do GitHub."
