name: Android Homologation

on:
  push:
    branches:
      - 'release/**'
      - 'homolog/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-and-build-homolog:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
          cache-dependency-path: |
            **/*.gradle*
            **/gradle-wrapper.properties

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Validate app version bump
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == release/* ]]; then
            echo "Branch release detectada; validacao de incremento de versao ignorada neste run."
            exit 0
          fi

          CURRENT_VERSION=$(awk '/^version:/{print $2; exit}' pubspec.yaml)
          if [ -z "$CURRENT_VERSION" ]; then
            echo "Nao foi possivel ler a versao atual no pubspec.yaml"
            exit 1
          fi

          if git show HEAD~1:pubspec.yaml >/dev/null 2>&1; then
            PREVIOUS_VERSION=$(git show HEAD~1:pubspec.yaml | awk '/^version:/{print $2; exit}')
            if [ -n "$PREVIOUS_VERSION" ] && [ "$CURRENT_VERSION" = "$PREVIOUS_VERSION" ]; then
              echo "Versao nao incrementada para homologacao: $CURRENT_VERSION"
              echo "Atualize o campo version no pubspec.yaml antes de distribuir no Firebase."
              exit 1
            fi
            echo "Versao validada para homologacao: atual=$CURRENT_VERSION anterior=$PREVIOUS_VERSION"
          else
            echo "Historico insuficiente para comparar versoes; validacao ignorada neste run."
          fi

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build debug APK (homologation candidate)
        run: flutter build apk --debug

      - name: Upload homologation APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: app-homolog-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Distribute homolog APK to Firebase App Distribution (QA)
        run: |
          APP_VERSION=$(awk '/^version:/{print $2; exit}' pubspec.yaml)
          SHORT_SHA="${GITHUB_SHA:0:7}"
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-debug.apk \
            --app "${{ secrets.FIREBASE_APP_ID_ANDROID }}" \
            --groups "testers-internos" \
            --release-notes "Build de homologacao ${APP_VERSION} (${SHORT_SHA}) via CI/CD."
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
