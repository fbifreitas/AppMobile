name: Backend CI

on:
  push:
    branches: ["main"]
    paths:
      - "apps/backend/**"
      - ".github/workflows/backend_ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "apps/backend/**"
      - ".github/workflows/backend_ci.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: apps/backend/pom.xml

      - name: Build
        run: mvn package -DskipTests -q

      - name: Test
        run: mvn test -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v6
        with:
          name: backoffice-api-jar
          path: apps/backend/target/*.jar
          if-no-files-found: error

  openapi-compatibility-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: apps/backend/pom.xml

      - name: Build current backend
        run: mvn -B -DskipTests package -f apps/backend/pom.xml

      - name: Run OpenAPI gate unit tests
        run: python3 .github/scripts/test_openapi_breaking_check.py -v

      - name: Generate current OpenAPI
        shell: bash
        run: |
          set -euo pipefail
          java -jar apps/backend/target/*.jar --server.port=8080 --spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration > /tmp/current-backend.log 2>&1 &
          CUR_PID=$!
          for i in {1..60}; do
            if curl -sf http://localhost:8080/api/openapi/v1 -o /tmp/openapi-current.json; then
              break
            fi
            if ! kill -0 "$CUR_PID" 2>/dev/null; then
              echo "Current backend process exited unexpectedly"
              cat /tmp/current-backend.log || true
              exit 1
            fi
            sleep 2
          done
          test -s /tmp/openapi-current.json || { cat /tmp/current-backend.log || true; exit 1; }
          kill $CUR_PID || true

      - name: Prepare main worktree
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git worktree add /tmp/appmobile-main origin/main

      - name: Build main backend
        run: mvn -B -DskipTests package -f /tmp/appmobile-main/apps/backend/pom.xml

      - name: Generate main OpenAPI
        shell: bash
        run: |
          set -euo pipefail
          java -jar /tmp/appmobile-main/apps/backend/target/*.jar --server.port=8081 --spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration > /tmp/main-backend.log 2>&1 &
          MAIN_PID=$!
          for i in {1..60}; do
            if curl -sf http://localhost:8081/api/openapi/v1 -o /tmp/openapi-main.json; then
              break
            fi
            if ! kill -0 "$MAIN_PID" 2>/dev/null; then
              echo "Main backend process exited unexpectedly"
              cat /tmp/main-backend.log || true
              exit 1
            fi
            sleep 2
          done
          test -s /tmp/openapi-main.json || { cat /tmp/main-backend.log || true; exit 1; }
          kill $MAIN_PID || true

      - name: Check OpenAPI breaking changes
        run: python3 .github/scripts/openapi_breaking_check.py /tmp/openapi-main.json /tmp/openapi-current.json
