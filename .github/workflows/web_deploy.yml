name: Web Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "apps/web-backoffice/**"
      - ".github/workflows/web_deploy.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/web-backoffice

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web-backoffice/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload deploy package
        uses: actions/upload-artifact@v6
        with:
          name: web-backoffice-deploy-package
          path: |
            apps/web-backoffice/.next
            apps/web-backoffice/public
            apps/web-backoffice/package.json
            apps/web-backoffice/next.config.mjs
          if-no-files-found: error

  deploy-staging:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - name: Check VPS secrets
        id: check_vps_staging
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [[ -n "$VPS_HOST" && -n "$VPS_USER" && -n "$VPS_SSH_KEY" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy web to VPS (staging)
        if: steps.check_vps_staging.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/backoffice
            git pull origin main
            docker compose -f infra/docker-compose.yml up -d --build web
            docker compose -f infra/docker-compose.yml exec -T web wget -qO- http://localhost:3000/health || true

      - name: Skip deploy without VPS secrets
        if: steps.check_vps_staging.outputs.ready != 'true'
        run: echo "Deploy web de staging ignorado: configure VPS_HOST, VPS_USER e VPS_SSH_KEY nos secrets do GitHub."

