name: Web Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "apps/web-backoffice/**"
      - ".github/workflows/web_deploy.yml"
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Validate VPS secrets
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [[ -n "$VPS_HOST" && -n "$VPS_USER" && -n "$VPS_SSH_KEY" ]]; then
            echo "Secrets de VPS presentes. Deploy SSH pode ser executado."
          else
            echo "Deploy ignorado: configure VPS_HOST, VPS_USER e VPS_SSH_KEY nos secrets do GitHub."
          fi

