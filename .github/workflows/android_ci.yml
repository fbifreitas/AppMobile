name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-and-build-debug:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Validate app version bump
        shell: bash
        run: |
          CURRENT_VERSION=$(awk '/^version:/{print $2; exit}' pubspec.yaml)
          if [ -z "$CURRENT_VERSION" ]; then
            echo "Nao foi possivel ler a versao atual no pubspec.yaml"
            exit 1
          fi

          if git show HEAD~1:pubspec.yaml >/dev/null 2>&1; then
            PREVIOUS_VERSION=$(git show HEAD~1:pubspec.yaml | awk '/^version:/{print $2; exit}')
            if [ -n "$PREVIOUS_VERSION" ] && [ "$CURRENT_VERSION" = "$PREVIOUS_VERSION" ]; then
              echo "Versao nao incrementada: $CURRENT_VERSION"
              echo "Atualize o campo version no pubspec.yaml antes do merge/push."
              exit 1
            fi
            echo "Versao validada: atual=$CURRENT_VERSION anterior=$PREVIOUS_VERSION"
          else
            echo "Historico insuficiente para comparar versoes; validacao ignorada neste run."
          fi

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
          cache-dependency-path: |
            **/*.gradle*
            **/gradle-wrapper.properties

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Validate UTF-8 encoding
        shell: pwsh
        run: ./scripts/check_utf8.ps1

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build debug APK (Kaptur)
        run: flutter build apk --debug --flavor kaptur --target lib/main_kaptur.dart --verbose

      - name: Build debug APK (Compass)
        run: >
          flutter build apk --debug --flavor compass --target lib/main_compass.dart
          --dart-define=APP_TENANT_ID=tenant-compass
          --dart-define=APP_API_BASE_URL=${{ vars.COMPASS_APP_API_BASE_URL }}
          --verbose

      - name: Upload debug APK artifact (Kaptur)
        uses: actions/upload-artifact@v6
        with:
          name: app-kaptur-debug-apk
          path: build/app/outputs/flutter-apk/app-kaptur-debug.apk
          if-no-files-found: error

      - name: Upload debug APK artifact (Compass)
        uses: actions/upload-artifact@v6
        with:
          name: app-compass-debug-apk
          path: build/app/outputs/flutter-apk/app-compass-debug.apk
          if-no-files-found: error
