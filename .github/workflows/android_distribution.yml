name: Android Distribution

on:
  workflow_run:
    workflows: ["Android Homologation"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Notas da release para os testers"
        required: false
        default: "Build distribuído manualmente pelo GitHub Actions"
      tester_group:
        description: "Grupo de testers no Firebase App Distribution"
        required: false
        default: "testers-internos"
      brand:
        description: "Marca para distribuir: kaptur, compass ou all"
        required: false
        default: "kaptur"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEFAULT_TESTER_GROUP: prod-testers
  DEFAULT_RELEASE_NOTES: Build distribuído automaticamente após Android CI verde

jobs:
  build-and-distribute-debug:
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'release/prod')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Validate app version bump
        shell: bash
        run: |
          CURRENT_VERSION=$(awk '/^version:/{print $2; exit}' pubspec.yaml)
          if [ -z "$CURRENT_VERSION" ]; then
            echo "Nao foi possivel ler a versao atual no pubspec.yaml"
            exit 1
          fi

          if git show HEAD~1:pubspec.yaml >/dev/null 2>&1; then
            PREVIOUS_VERSION=$(git show HEAD~1:pubspec.yaml | awk '/^version:/{print $2; exit}')
            if [ -n "$PREVIOUS_VERSION" ] && [ "$CURRENT_VERSION" = "$PREVIOUS_VERSION" ]; then
              echo "Versao nao incrementada para distribuicao: $CURRENT_VERSION"
              echo "Atualize o campo version no pubspec.yaml antes de distribuir no Firebase."
              exit 1
            fi
            echo "Versao validada para distribuicao: atual=$CURRENT_VERSION anterior=$PREVIOUS_VERSION"
          else
            echo "Historico insuficiente para comparar versoes; validacao ignorada neste run."
          fi

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            **/*.gradle*
            **/gradle-wrapper.properties

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true

      - name: Validate Firebase secrets
        run: |
          if [ -z "${{ secrets.FIREBASE_APP_ID_ANDROID }}" ]; then
            echo "Secret FIREBASE_APP_ID_ANDROID não configurado"
            exit 1
          fi
          if [ "${{ github.event.inputs.brand }}" = "compass" ] || [ "${{ github.event.inputs.brand }}" = "all" ]; then
            if [ -z "${{ secrets.FIREBASE_APP_ID_ANDROID_COMPASS }}" ]; then
              echo "Secret FIREBASE_APP_ID_ANDROID_COMPASS nao configurado"
              exit 1
            fi
          fi
          if [ -z "${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}" ]; then
            echo "Secret GOOGLE_APPLICATION_CREDENTIALS_JSON não configurado"
            exit 1
          fi

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          APP_VERSION=$(awk '/^version:/{print $2; exit}' pubspec.yaml)
          if [ -z "$APP_VERSION" ]; then
            echo "Nao foi possivel ler a versao no pubspec.yaml"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            SOURCE_SHA="${{ github.event.workflow_run.head_sha }}"
          else
            SOURCE_SHA="${GITHUB_SHA}"
          fi
          SHORT_SHA="${SOURCE_SHA:0:7}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_NOTES="${{ github.event.inputs.release_notes }}"
            INPUT_GROUP="${{ github.event.inputs.tester_group }}"
            INPUT_BRAND="${{ github.event.inputs.brand }}"

            if [ -z "$INPUT_NOTES" ]; then
              RELEASE_NOTES="Build ${APP_VERSION} (${SHORT_SHA}) distribuido manualmente pelo GitHub Actions"
            else
              RELEASE_NOTES="${INPUT_NOTES} | versao ${APP_VERSION} | commit ${SHORT_SHA}"
            fi

            # Permite seleção manual do grupo apenas em builds manuais
            if [ -z "$INPUT_GROUP" ]; then
              TESTER_GROUP="testers-internos"
            else
              TESTER_GROUP="$INPUT_GROUP"
            fi
            if [ -z "$INPUT_BRAND" ]; then
              DISTRIBUTION_BRAND="kaptur"
            else
              DISTRIBUTION_BRAND="$INPUT_BRAND"
            fi
          else
            # Builds automáticos de produção vão para prod-testers
            RELEASE_NOTES="Build ${APP_VERSION} (${SHORT_SHA}) distribuido automaticamente apos Android CI verde"
            TESTER_GROUP="prod-testers"
            DISTRIBUTION_BRAND="kaptur"
          fi

          echo "app_version=${APP_VERSION}" >> $GITHUB_OUTPUT
          echo "source_sha=${SOURCE_SHA}" >> $GITHUB_OUTPUT
          echo "release_notes=${RELEASE_NOTES}" >> $GITHUB_OUTPUT
          echo "tester_group=${TESTER_GROUP}" >> $GITHUB_OUTPUT
          case "$DISTRIBUTION_BRAND" in
            kaptur|compass|all) ;;
            *)
              echo "Brand invalida para distribuicao: $DISTRIBUTION_BRAND"
              exit 1
              ;;
          esac
          echo "distribution_brand=${DISTRIBUTION_BRAND}" >> $GITHUB_OUTPUT

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build debug APK (Kaptur)
        if: steps.meta.outputs.distribution_brand == 'kaptur' || steps.meta.outputs.distribution_brand == 'all'
        run: flutter build apk --debug --flavor kaptur --target lib/main_kaptur.dart

      - name: Build debug APK (Compass)
        if: steps.meta.outputs.distribution_brand == 'compass' || steps.meta.outputs.distribution_brand == 'all'
        run: >
          flutter build apk --debug --flavor compass --target lib/main_compass.dart
          --dart-define=APP_TENANT_ID=tenant-compass
          --dart-define=APP_API_BASE_URL=${{ vars.COMPASS_APP_API_BASE_URL }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Setup Google credentials
        run: echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > /tmp/gcloud-key.json

      - name: Distribute Kaptur debug APK to Firebase App Distribution
        if: steps.meta.outputs.distribution_brand == 'kaptur' || steps.meta.outputs.distribution_brand == 'all'
        run: |
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-kaptur-debug.apk \
            --app "${{ secrets.FIREBASE_APP_ID_ANDROID }}" \
            --groups "${{ steps.meta.outputs.tester_group }}" \
            --release-notes "${{ steps.meta.outputs.release_notes }}"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcloud-key.json

      - name: Distribute Compass debug APK to Firebase App Distribution
        if: steps.meta.outputs.distribution_brand == 'compass' || steps.meta.outputs.distribution_brand == 'all'
        run: |
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-compass-debug.apk \
            --app "${{ secrets.FIREBASE_APP_ID_ANDROID_COMPASS }}" \
            --groups "${{ steps.meta.outputs.tester_group }}" \
            --release-notes "Compass | ${{ steps.meta.outputs.release_notes }}"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcloud-key.json

      - name: Upload Kaptur debug APK artifact
        if: steps.meta.outputs.distribution_brand == 'kaptur' || steps.meta.outputs.distribution_brand == 'all'
        uses: actions/upload-artifact@v6
        with:
          name: app-kaptur-debug-apk-firebase
          path: build/app/outputs/flutter-apk/app-kaptur-debug.apk
          if-no-files-found: error

      - name: Upload Compass debug APK artifact
        if: steps.meta.outputs.distribution_brand == 'compass' || steps.meta.outputs.distribution_brand == 'all'
        uses: actions/upload-artifact@v6
        with:
          name: app-compass-debug-apk-firebase
          path: build/app/outputs/flutter-apk/app-compass-debug.apk
          if-no-files-found: error
