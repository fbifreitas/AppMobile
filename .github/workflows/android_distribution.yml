name: Android Distribution

on:
  workflow_run:
    workflows: ["Android CI"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Notas da release para os testers"
        required: false
        default: "Build distribuído manualmente pelo GitHub Actions"
      tester_group:
        description: "Grupo de testers no Firebase App Distribution"
        required: false
        default: "testers-internos"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEFAULT_TESTER_GROUP: testers-internos
  DEFAULT_RELEASE_NOTES: Build distribuído automaticamente após Android CI verde

jobs:
  build-and-distribute-debug:
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            **/*.gradle*
            **/gradle-wrapper.properties

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true

      - name: Validate Firebase secrets
        run: |
          if [ -z "${{ secrets.FIREBASE_APP_ID_ANDROID }}" ]; then
            echo "Secret FIREBASE_APP_ID_ANDROID não configurado"
            exit 1
          fi
          if [ -z "${{ secrets.FIREBASE_TOKEN }}" ]; then
            echo "Secret FIREBASE_TOKEN não configurado"
            exit 1
          fi

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release_notes=${{ github.event.inputs.release_notes }}" >> $GITHUB_OUTPUT
            echo "tester_group=${{ github.event.inputs.tester_group }}" >> $GITHUB_OUTPUT
          else
            echo "release_notes=${DEFAULT_RELEASE_NOTES}" >> $GITHUB_OUTPUT
            echo "tester_group=${DEFAULT_TESTER_GROUP}" >> $GITHUB_OUTPUT
          fi

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Distribute debug APK to Firebase App Distribution
        run: |
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-debug.apk             --app "${{ secrets.FIREBASE_APP_ID_ANDROID }}"             --groups "${{ steps.meta.outputs.tester_group }}"             --release-notes "${{ steps.meta.outputs.release_notes }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: app-debug-apk-firebase
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
