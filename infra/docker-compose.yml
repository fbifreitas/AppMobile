services:

  ai-gateway:
    build:
      context: ../apps/ai-gateway
    ports:
      - "${AI_GATEWAY_HOST_PORT:-8091}:8091"
    env_file: .env
    environment:
      - GATEWAY_API_KEY=${AI_GATEWAY_API_KEY:-}
      - GATEWAY_REQUIRE_SECRET=${AI_GATEWAY_ENABLED:-false}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - GEMINI_ENABLED=${GEMINI_ENABLED:-false}
      - GEMINI_GROUNDING_ENABLED=${GEMINI_GROUNDING_ENABLED:-false}
      - GEMINI_TIMEOUT_MS=${GEMINI_TIMEOUT_MS:-30000}
      - GEMINI_BASE_URL=${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8091/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ../apps/web-backoffice
    env_file: .env
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - BACKEND_API_URL=http://api:8080
      - BACKOFFICE_OPERATIONS_API_BASE_URL=http://api:8080/api
      - BACKOFFICE_INSPECTIONS_API_BASE_URL=http://api:8080/api/backoffice/inspections
      - BACKOFFICE_CONFIG_API_BASE_URL=http://api:8080/api/backoffice/config
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  api:
    build:
      context: ../apps/backend
    env_file: .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_DATA_REDIS_HOST=cache
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - STORAGE_ADAPTER=${STORAGE_ADAPTER:-local}
      - STORAGE_LOCAL_PATH=/data/uploads
      - AI_GATEWAY_ENABLED=${AI_GATEWAY_ENABLED:-false}
      - AI_GATEWAY_BASE_URL=${AI_GATEWAY_BASE_URL:-http://ai-gateway:8091}
      - AI_GATEWAY_API_KEY=${AI_GATEWAY_API_KEY:-}
      - AI_GATEWAY_MODEL=${AI_GATEWAY_MODEL:-gemini-2.5-flash}
      - AI_GATEWAY_RESEARCH_PATH=${AI_GATEWAY_RESEARCH_PATH:-/v1/research/cases}
      - AI_GATEWAY_REQUIRE_SECRET=${AI_GATEWAY_REQUIRE_SECRET:-true}
      - PLATFORM_BOOTSTRAP_ENABLED=${COMPOSE_PLATFORM_BOOTSTRAP_ENABLED:-false}
      - PLATFORM_BOOTSTRAP_TENANT_ID=${COMPOSE_PLATFORM_BOOTSTRAP_TENANT_ID:-}
      - PLATFORM_BOOTSTRAP_TENANT_SLUG=${COMPOSE_PLATFORM_BOOTSTRAP_TENANT_SLUG:-}
      - PLATFORM_BOOTSTRAP_TENANT_NAME=${COMPOSE_PLATFORM_BOOTSTRAP_TENANT_NAME:-}
      - PLATFORM_BOOTSTRAP_ADMIN_EMAIL=${COMPOSE_PLATFORM_BOOTSTRAP_ADMIN_EMAIL:-}
      - PLATFORM_BOOTSTRAP_ADMIN_NAME=${COMPOSE_PLATFORM_BOOTSTRAP_ADMIN_NAME:-}
      - PLATFORM_BOOTSTRAP_ADMIN_PASSWORD=${COMPOSE_PLATFORM_BOOTSTRAP_ADMIN_PASSWORD:-}
      - AUTH_FIRST_ACCESS_EXPOSE_DEBUG_OTP=${COMPOSE_AUTH_FIRST_ACCESS_EXPOSE_DEBUG_OTP:-false}
    volumes:
      - uploads:/data/uploads
    depends_on:
      ai-gateway:
        condition: service_healthy
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    env_file: .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cache:
    image: redis:7-alpine
    env_file: .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep -q PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
