appId: com.example.myapp
tags:
  - smoke
  - login-publicado
---
- launchApp:
    clearState: false

- takeScreenshot: "00-app-aberto"

# Se tela de login estiver visĂ­vel, executa login
- runFlow:
    when:
      visible: "E-mail|Email|UsuĂ¡rio"
    commands:
      - tapOn: "E-mail|Email|UsuĂ¡rio"
      - inputText: "seu.usuario@teste.com"
      - takeScreenshot: "01-email-preenchido"
      - tapOn: "Senha"
      - inputText: "123456"
      - hideKeyboard
      - takeScreenshot: "02-senha-preenchida"

# Build mais novo: tenta seletor estĂ¡vel por id
- runFlow:
    when:
      visible: "login_submit_button"
    commands:
      - takeScreenshot: "03-botao-encontrado-por-id"
      - tapOn:
          id: "login_submit_button"
      - takeScreenshot: "03-submit-por-id"

# Build publicado: fallback por texto (regex case-insensitive)
- runFlow:
    when:
      visible: "(?i)(entrar|acessar|continuar|avancar|avanĂ§ar|login)"
    commands:
      - scrollUntilVisible:
          element:
            text: "(?i)(entrar|acessar|continuar|avancar|avanĂ§ar|login)"
          direction: DOWN
      - takeScreenshot: "03-botao-encontrado-por-texto"
      - tapOn: "(?i)(entrar|acessar|continuar|avancar|avanĂ§ar|login)"
      - takeScreenshot: "03-submit-por-texto"

# Valida destino final aceitando home, onboarding ou aprovacao pendente
- takeScreenshot: "04-aguardando-destino-final"

- extendedWaitUntil:
  visible: "(?i)(menu de vistoria|inĂ­cio|home|cadastro pj|continuar|concluir|cadastro em anĂ¡lise|verificar status)"
    timeout: 20000

- runFlow:
    when:
      visible: "Cadastro PJ|Continuar|Concluir"
    commands:
      - takeScreenshot: "04-destino-onboarding"

- runFlow:
    when:
      visible: "Cadastro em anĂ¡lise|Verificar status"
    commands:
      - takeScreenshot: "04-destino-aprovacao"

- runFlow:
    when:
      visible: "(?i)(menu de vistoria|inĂ­cio|home)"
    commands:
      - takeScreenshot: "04-destino-home"